<title>Participantes - Brilla & Canta</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Segoe UI',Arial,sans-serif; background:#12122b; color:#fff; padding:20px; }
  .contenedor { max-width:900px; margin:0 auto; }
  .panel { background:#1e1e40; border-radius:14px; padding:20px; margin-bottom:20px; }
  label { display:block; margin:10px 0 4px; font-size:0.9em; opacity:0.85; }
  input { width:100%; padding:10px; border-radius:8px; border:none; font-size:1em; }
  .fila2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .btn { padding:12px 20px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:14px; }
  .btn-guardar { background:#2ecc71; color:#fff; }
  .btn-limpiar { background:#7f8c8d; color:#fff; margin-left:8px; }
  .msg { margin-top:10px; padding:10px; border-radius:8px; font-size:0.9em; }
  .msg-ok { background:rgba(46,204,113,0.2); border:1px solid #2ecc71; }
  .msg-error { background:rgba(231,76,60,0.2); border:1px solid #e74c3c; }
  .lista { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:12px; }
  .tarjeta { background:#26264a; border-radius:10px; padding:10px; text-align:center; cursor:pointer; }
  .tarjeta img { width:70px; height:70px; border-radius:50%; object-fit:cover; margin-bottom:6px; }
  .tarjeta:hover { outline:2px solid #ffd166; }
  .previa { text-align:center; margin-top:10px; }
  .previa img { width:90px; height:90px; border-radius:50%; object-fit:cover; }
  h1 { text-align:center; }
</style>
</head>

  <h1>🎭 Participantes — Brilla & Canta</h1>

<div id="login" class="panel" style="max-width:420px; margin:40px auto; text-align:center;">
  <label>Clave de producción</label>
  <input type="password" id="clave" placeholder="Clave">
  <button class="btn btn-guardar" style="width:100%" onclick="ingresar()">Ingresar</button>
  <div id="loginError"></div>
</div>

<div id="app" style="display:none;">
  <div class="panel">
    <h3 id="tituloForm">➕ Agregar participante</h3>
    <input type="hidden" id="pId">
    <label>Nombre completo</label>
    <input id="pNombre" placeholder="Ej: María Fernanda Rojas">
    <div class="fila2">
      <div>
        <label>Categoría</label>
        <input id="pCategoria" placeholder="Ej: Infantil / Juvenil / Adulto">
      </div>
      <div>
        <label>Ciudad</label>
        <input id="pCiudad" placeholder="Ej: Cúcuta">
      </div>
    </div>
    <label>Título de la canción</label>
    <input id="pCancion" placeholder="Ej: Volver a Empezar">
    <div class="fila2">
      <div>
        <label>Orden de presentación</label>
        <input id="pOrden" type="number" placeholder="Ej: 1">
      </div>
      <div>
        <label>Link de la foto (Google Drive u otra URL)</label>
        <input id="pImagen" placeholder="Pega aquí el link para compartir de Drive">
      </div>
    </div>
    <div class="previa" id="previaFoto"></div>
    <button class="btn btn-guardar" onclick="guardar()">💾 Guardar participante</button>
    <button class="btn btn-limpiar" onclick="limpiarForm()">Limpiar / Nuevo</button>
    <div id="formMsg"></div>
  </div>

  <div class="panel">
    <h3>📋 Participantes cargados (<span id="contador">0</span>)</h3>
    <div class="lista" id="lista"></div>
  </div>
</div>
</div>

<script>
// ⚠️ REEMPLAZA con la URL de tu Apps Script
const API_URL = "https://script.google.com/macros/library/d/1R1a5rxcuYnrMd2iz0-fXPP_NfFjPOqnW89rdOm9kRSfG6fiqMFU5y9p7/2";

let clave = '';
let participantes = [];

function ingresar() {
  clave = document.getElementById('clave').value;
  if (!clave) return;
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  cargarLista();
}

document.getElementById('pImagen') && document.addEventListener('input', function (e) {
  if (e.target && e.target.id === 'pImagen') actualizarPrevia();
});

function actualizarPrevia() {
  const url = document.getElementById('pImagen').value;
  const previa = document.getElementById('previaFoto');
  if (!url) { previa.innerHTML = ''; return; }
  previa.innerHTML = `<img src="${convertirLinkDrivePreview(url)}" onerror="this.style.display='none'">`;
}

// Igual que en el backend: si es un link de Drive lo convierte para poder previsualizarlo
function convertirLinkDrivePreview(url) {
  const match = url.match(/[-\w]{25,}/);
  if (match && url.indexOf('drive.google.com') !== -1) {
    return 'https://drive.google.com/thumbnail?id=' + match[0] + '&sz=w500';
  }
  return url;
}

async function cargarLista() {
  const res = await fetch(`${API_URL}?action=participantes`);
  participantes = await res.json();
  document.getElementById('contador').textContent = participantes.length;
  const lista = document.getElementById('lista');
  lista.innerHTML = participantes.map(p => `
    <div class="tarjeta" onclick="editar('${p.id}')">
      ${p.imagenURL ? `<img src="${p.imagenURL}">` : ''}
      <div><b>${p.nombre}</b></div>
      <div style="font-size:0.75em; opacity:0.7;">${p.ciudad || ''}</div>
    </div>
  `).join('');
}

function editar(id) {
  const p = participantes.find(x => String(x.id) === String(id));
  if (!p) return;
  document.getElementById('tituloForm').textContent = '✏️ Editando: ' + p.nombre;
  document.getElementById('pId').value = p.id;
  document.getElementById('pNombre').value = p.nombre || '';
  document.getElementById('pCategoria').value = p.categoria || '';
  document.getElementById('pCiudad').value = p.ciudad || '';
  document.getElementById('pCancion').value = p.cancion || '';
  document.getElementById('pOrden').value = p.orden || '';
  document.getElementById('pImagen').value = p.imagenURL || '';
  actualizarPrevia();
  window.scrollTo(0, 0);
}

function limpiarForm() {
  document.getElementById('tituloForm').textContent = '➕ Agregar participante';
  ['pId','pNombre','pCategoria','pCiudad','pCancion','pOrden','pImagen'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('previaFoto').innerHTML = '';
  document.getElementById('formMsg').innerHTML = '';
}

async function guardar() {
  const payload = {
    action: 'guardarParticipante',
    id: document.getElementById('pId').value || null,
    nombre: document.getElementById('pNombre').value,
    categoria: document.getElementById('pCategoria').value,
    ciudad: document.getElementById('pCiudad').value,
    cancion: document.getElementById('pCancion').value,
    orden: document.getElementById('pOrden').value,
    imagenURL: document.getElementById('pImagen').value,
    clave: clave
  };
  if (!payload.nombre) {
    document.getElementById('formMsg').innerHTML = '<div class="msg msg-error">El nombre es obligatorio</div>';
    return;
  }
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (data.error) {
    document.getElementById('formMsg').innerHTML = `<div class="msg msg-error">${data.error}</div>`;
  } else {
    document.getElementById('formMsg').innerHTML = `<div class="msg msg-ok">✅ ${data.mensaje}</div>`;
    limpiarForm();
    cargarLista();
  }
}
</script>
</body>
</html>
